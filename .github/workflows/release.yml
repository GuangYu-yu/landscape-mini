name: 发布

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 准备发布元数据
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: 解析发布元数据
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "release_tag=${GITHUB_REF_NAME}"
            echo "target_sha=${GITHUB_SHA}"
          } >> "$GITHUB_OUTPUT"

  build_debian_no_docker:
    name: 构建 Debian（不含 Docker）
    needs: prepare
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      base_system: debian
      include_docker: 'false'
      output_formats: img,ova
      run_test: readiness,dataplane
      compress_output: no
      release_channel: public-release
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      repository_owner: ${{ github.repository_owner }}

  build_debian_docker:
    name: 构建 Debian（含 Docker）
    needs: prepare
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/_build-and-validate.yml
    with:
      base_system: debian
      include_docker: 'true'
      output_formats: img,ova
      run_test: readiness
      compress_output: no
      release_channel: public-release
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      repository_owner: ${{ github.repository_owner }}

  release:
    name: 发布版本
    needs:
      - prepare
      - build_debian_no_docker
      - build_debian_docker
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: 下载 Debian 不含 Docker 构建产物
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_debian_no_docker.outputs.image_artifact }}
          path: artifacts/debian-no-docker/

      - name: 下载 Debian 含 Docker 构建产物
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_debian_docker.outputs.image_artifact }}
          path: artifacts/debian-docker/

      - name: 校验发布产物
        shell: bash
        env:
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          expected_dirs=(
            "artifacts/debian-no-docker:false"
            "artifacts/debian-docker:true"
          )

          found=0
          for spec in "${expected_dirs[@]}"; do
            dir="${spec%%:*}"
            expected_include_docker="${spec##*:}"
            metadata="$dir/metadata/build-metadata.txt"
            config="$dir/metadata/effective-landscape_init.toml"
            image=("$dir"/*.img)
            ova=("$dir"/*.ova)

            if [ ! -f "$metadata" ]; then
              echo "Missing build metadata in $dir" >&2
              exit 1
            fi
            if [ ! -f "$config" ]; then
              echo "Missing effective topology config in $dir" >&2
              exit 1
            fi
            if [ ${#image[@]} -ne 1 ]; then
              echo "Expected exactly one raw image in $dir" >&2
              exit 1
            fi
            if [ ${#ova[@]} -ne 1 ]; then
              echo "Expected exactly one OVA in $dir" >&2
              exit 1
            fi

            git_sha="$(awk -F'=' '/^git_sha=/{print $2; exit}' "$metadata")"
            base_system="$(awk -F'=' '/^base_system=/{print $2; exit}' "$metadata")"
            include_docker="$(awk -F'=' '/^include_docker=/{print $2; exit}' "$metadata")"
            output_formats="$(awk -F'=' '/^output_formats=/{print $2; exit}' "$metadata")"
            produced_files="$(awk -F'=' '/^produced_files=/{print $2; exit}' "$metadata")"
            release_channel="$(awk -F'=' '/^release_channel=/{print $2; exit}' "$metadata")"
            release_tag="$(awk -F'=' '/^release_tag=/{print $2; exit}' "$metadata")"

            if [ "$git_sha" != "$TARGET_SHA" ]; then
              echo "Artifact in $dir has git_sha=$git_sha, expected $TARGET_SHA" >&2
              exit 1
            fi
            if [ "$base_system" != "debian" ]; then
              echo "Artifact in $dir has base_system=$base_system, expected debian" >&2
              exit 1
            fi
            if [ "$include_docker" != "$expected_include_docker" ]; then
              echo "Artifact in $dir has include_docker=$include_docker, expected $expected_include_docker" >&2
              exit 1
            fi
            if [ "$output_formats" != "img,ova" ]; then
              echo "Artifact in $dir has output_formats=$output_formats, expected img,ova" >&2
              exit 1
            fi
            if [ "$release_channel" != "public-release" ]; then
              echo "Artifact in $dir has release_channel=$release_channel, expected public-release" >&2
              exit 1
            fi
            if [ "$release_tag" != "${{ needs.prepare.outputs.release_tag }}" ]; then
              echo "Artifact in $dir has release_tag=$release_tag, expected ${{ needs.prepare.outputs.release_tag }}" >&2
              exit 1
            fi
            if [[ "$produced_files" != *.img* || "$produced_files" != *.ova* ]]; then
              echo "Artifact in $dir produced_files=$produced_files, expected img and ova outputs" >&2
              exit 1
            fi

            found=$((found + 1))
          done

          if [ "$found" -ne 2 ]; then
            echo "Expected 2 release artifacts, found $found" >&2
            exit 1
          fi

      - name: 压缩 raw 镜像
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/*/*.img; do
            gzip -k "$f"
          done

      - name: 写发布摘要
        shell: bash
        run: |
          set -euo pipefail
          release_url="https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.release_tag }}"
          {
            echo "## 发布重建"
            echo ""
            echo "| 字段 | 值 |"
            echo "| --- | --- |"
            echo "| 标签 | ${{ needs.prepare.outputs.release_tag }} |"
            echo "| 源提交 | ${{ needs.prepare.outputs.target_sha }} |"
            echo "| 构建模式 | 标签推送时重建（不使用 CI 产物升级） |"
            echo "| 覆盖范围 | debian × include_docker true/false |"
            echo "| 发布文件 | .img.gz + .ova |"
            echo "| 发布页面 | ${release_url} |"
            echo ""
            echo "| 资源组 | 用途 |"
            echo "| --- | --- |"
            echo "| .img.gz | 压缩 raw 镜像，用于直接安装或刷写 |"
            echo "| .ova | 虚拟设备导入包 |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 创建 GitHub 发布
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.img.gz
            artifacts/**/*.ova
          generate_release_notes: true